modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/ash1688/nuclear-powered/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/ash1688/nuclear-powered"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="jei"
    mandatory=false
    versionRange="[15.0.0,)"
    ordering="AFTER"
    side="CLIENT"

# LDLib — mandatory. Provides the MetaMachine UI framework NP uses for its
# machine GUIs, widgets, and cover-aware energy handling. Shared with GT CEu
# but stands alone, so standalone-pack users get it too.
[[dependencies.${mod_id}]]
    modId="ldlib"
    mandatory=true
    versionRange="[1.0.50,)"
    ordering="AFTER"
    side="BOTH"

# GregTech CEu Modern — soft dep. When present, NP's compat layer registers
# recipes into GT machines (Macerator, Centrifuge, Chemical Reactor, Assembler)
# and enables the FE<->EU converter block. NP loads and works fully without
# GT — tier-gated crafting falls back to vanilla-iron recipes.
[[dependencies.${mod_id}]]
    modId="gtceu"
    mandatory=false
    versionRange="[1.20.1-7.5.3,)"
    ordering="AFTER"
    side="BOTH"
